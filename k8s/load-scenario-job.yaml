# 시나리오 데이터를 PVC에 복사하는 one-shot Job.
# 호스트의 /data/deepmimo-scenarios 경로에 시나리오 파일이 있어야 한다.
# 사용법: kubectl apply -f k8s/load-scenario-job.yaml -n kubeflow
apiVersion: batch/v1
kind: Job
metadata:
  name: deepmimo-load-scenarios
  namespace: kubeflow
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: load-data
          image: 192.168.1.112:5000/deepmimo-base:latest
          command:
            - sh
            - -c
            - |
              echo "시나리오 데이터 복사 시작..."
              cp -rv /host-data/. /data/scenarios/
              echo "완료: $(ls /data/scenarios)"
          volumeMounts:
            - name: host-data
              mountPath: /host-data
              readOnly: true
            - name: scenarios-pvc
              mountPath: /data/scenarios
      containers:
        - name: verify
          image: 192.168.1.112:5000/deepmimo-base:latest
          command:
            - sh
            - -c
            - |
              echo "=== PVC 내용 확인 ==="
              ls -la /data/scenarios/
      volumes:
        - name: host-data
          hostPath:
            # 호스트 머신에서 시나리오 데이터가 있는 경로로 수정
            path: /home/fall/data/deepmimo-scenarios
            type: DirectoryOrCreate
        - name: scenarios-pvc
          persistentVolumeClaim:
            claimName: deepmimo-scenarios
