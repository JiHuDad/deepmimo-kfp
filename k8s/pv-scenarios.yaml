# hostPath PV: 시나리오 데이터를 복사 없이 직접 마운트
# 복사본 없이 기존 경로를 Pod에서 읽기 전용으로 사용
apiVersion: v1
kind: PersistentVolume
metadata:
  name: deepmimo-scenarios-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""          # 수동 바인딩
  hostPath:
    path: SCENARIO_HOST_PATH_PLACEHOLDER
    type: Directory
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - leaf007
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: deepmimo-scenarios
  namespace: kubeflow
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""          # 수동 바인딩
  volumeName: deepmimo-scenarios-pv
  resources:
    requests:
      storage: 50Gi
