# KFP 파이프라인 아티팩트 공용 PVC
#
# 컴포넌트 간 모델 가중치, 데이터셋, 평가 결과 등을 공유하는 스토리지.
# KFP Backend 가 아티팩트 URI 로 이 PVC 경로를 사용한다.
#
# 적용:
#   kubectl apply -f mlops_platform/k8s/pvc-artifacts.yaml
#
# 참고: k3s 기본 StorageClass(local-path) 는 ReadWriteOnce 만 지원한다.
# KFP 는 여러 Pod 가 동시에 같은 PVC 에 접근하므로 ReadWriteMany 가 필요하다.
# → NFS 또는 Longhorn 등 RWX 지원 StorageClass 사용 권장.
# → 단일 노드 개발 환경에서는 local-path + ReadWriteOnce 도 동작할 수 있음.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlops-artifacts
  namespace: kubeflow
spec:
  accessModes:
    - ReadWriteMany           # 여러 컴포넌트 Pod 동시 읽기/쓰기
  resources:
    requests:
      storage: 50Gi
  storageClassName: local-path  # k3s 기본값; RWX 지원 SC 로 변경 가능
